apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: rpmbuild-pipeline-pull-master-pipeline
spec:
  tasks:
    - name: run-pipeline-olm-operator-konflux-sample
      pipelineRef:
        resolver: git
        params:
          - name: url
            value: "https://github.com/konflux-ci/olm-operator-konflux-sample.git"
          - name: revision
            value: main
          - name: pathInRepo
            value: .tekton/multi-arch-build-pipeline.yaml
      params:
        - name: git-url
          value: '{{source_url}}'
        - name: revision
          value: '{{revision}}'
        - name: output-image
          value: quay.io/redhat-user-workloads/rpm-build-pipeline-tenant/environment:on-pr-{{revision}}
        - name: image-expires-after
          value: 5d
        - name: dockerfile
          value: /Containerfile
        - name: build-platforms
          value:
            - linux/x86_64
            - linux/arm64
            - linux/ppc64le
            - linux/s390x
      
    - name: run-pipeline-b
      taskRef:
        name: create-mr-pipeline.yaml # Second Pipeline
      runAfter:
        - run-pipeline-olm-operator-konflux-sample # Ensures Sequential execution
